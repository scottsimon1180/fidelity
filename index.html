<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
/>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="apple-touch-icon" href="icon-IOS.png">

<title>Pixel Compare</title>

<style>
  :root{
    --bg:#0b0b0c;
    --card:#141416;
    --card-2:#1b1b1f;
    --text:#f5f5f7;
    --sub:#8e8e93;
    --line:rgba(255,255,255,0.08);
    --line-strong:rgba(255,255,255,0.12);
    --green:#32d74b;
    --red:#ff453a;
    --shadow:0 18px 40px rgba(0,0,0,0.35);
    --radius-xl:22px;
    --radius-lg:16px;
  }

  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
    overflow:hidden;
  }

  body{
    min-height:100vh;
    min-height:100dvh;
  }

  button,
  input,
  canvas,
  img{
    font:inherit;
  }

  button,
  input{
    touch-action:manipulation;
  }

  .app{
    width:100%;
    max-width:430px;
    height:100vh;
    height:100dvh;
    margin:0 auto;
    padding:
      max(10px, env(safe-area-inset-top))
      12px
      max(10px, env(safe-area-inset-bottom))
      12px;
    display:grid;
    grid-template-rows:
      minmax(0, 1fr)
      auto
      auto
      auto;
    gap:10px;
    overflow:hidden;
  }

  .frame{
    min-width:0;
    min-height:0;
    overflow:hidden;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00)),
      var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius-xl);
    box-shadow:var(--shadow);
  }

  /* Frame 1 */
  .diff-frame-wrap{
    height:100%;
    min-height:0;
    padding:10px;
    display:grid;
    grid-template-rows:minmax(0, 1fr) auto;
    gap:10px;
  }

  .diff-view{
    min-width:0;
    min-height:0;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    cursor:pointer;
  }

  .diff-stage{
    position:relative;
    width:100%;
    height:100%;
    max-width:100%;
    max-height:100%;
    background:#0d0d0f;
    border:1px solid var(--line);
    border-radius:16px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    flex:0 0 auto;
  }

  .diff-stage canvas{
    width:100%;
    height:100%;
    display:block;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }

  .diff-placeholder{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:16px;
    color:var(--sub);
    font-size:13px;
    line-height:1.35;
    pointer-events:none;
  }

  .progress-wrap{
    display:grid;
    gap:7px;
  }

  .progress-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    min-width:0;
    font-size:13px;
    line-height:1;
  }

  .status{
    min-width:0;
    flex:1 1 auto;
    color:var(--sub);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    transition:color 0.18s ease;
  }

  .status.status-success{
    color:var(--green);
  }

  .status.status-error{
    color:var(--red);
  }

  .percent{
    flex:0 0 auto;
    color:var(--text);
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }

  .bar{
    width:100%;
    height:12px;
    border-radius:999px;
    background:#0d0d0f;
    border:1px solid var(--line);
    overflow:hidden;
  }

  .bar-fill{
    width:0%;
    height:100%;
    border-radius:999px;
    background:linear-gradient(
      90deg,
      rgba(50,215,75,0.88) 0%,
      rgba(50,215,75,1) 48%,
      rgba(120,255,145,0.96) 100%
    );
    box-shadow:0 0 20px rgba(50,215,75,0.28);
    transition:width 0.08s linear;
  }

  .progress-bottom{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    min-width:0;
    color:var(--sub);
    font-size:12px;
    font-variant-numeric:tabular-nums;
  }

  .progress-bottom > div{
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* Frame 2 */
  .results-wrap{
    height:100%;
    min-height:0;
    padding:10px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    align-content:end;
  }

  .metric{
    min-width:0;
    min-height:0;
    overflow:hidden;
    border-radius:16px;
    padding:10px 10px 9px;
    display:grid;
    grid-template-rows:auto 1fr;
    align-items:stretch;
    gap:8px;
    background:#0d0d0f;
    border:1px solid var(--line);
  }

  .metric.red{
    border-color:rgba(255,69,58,0.18);
    background:linear-gradient(180deg, rgba(255,69,58,0.04), rgba(255,69,58,0.01));
  }

  .metric.green{
    border-color:rgba(50,215,75,0.18);
    background:linear-gradient(180deg, rgba(50,215,75,0.04), rgba(50,215,75,0.01));
  }

  .metric-label{
    margin:0;
    color:var(--sub);
    font-size:11px;
    line-height:1.1;
    font-weight:800;
    letter-spacing:0.05em;
    text-transform:uppercase;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .metric-values{
    min-width:0;
    min-height:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    text-align:center;
  }

  .metric-percent{
    margin:0;
    min-width:0;
    font-size:clamp(18px, 5.1vw, 27px);
    line-height:1;
    font-weight:800;
    letter-spacing:-0.03em;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .metric-pixels{
    margin:0;
    min-width:0;
    font-size:clamp(12px, 3.4vw, 16px);
    line-height:1.1;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .metric.red .metric-percent,
  .metric.red .metric-pixels{ color:var(--red); }

  .metric.green .metric-percent,
  .metric.green .metric-pixels{ color:var(--green); }

  /* Frame 3 */
  .images-wrap{
    padding:10px;
    display:grid;
    grid-template-rows:auto auto;
    gap:10px;
    align-content:end;
  }

  .image-row{
    min-width:0;
    display:grid;
    grid-template-columns:minmax(0, 1.48fr) minmax(92px, 0.82fr);
    gap:10px;
    align-items:stretch;
  }

  .image-btn{
    appearance:none;
    position:relative;
    isolation:isolate;
    border:none;
    width:100%;
    min-width:0;
    border-radius:18px;
    cursor:pointer;
    display:block;
    overflow:hidden;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.015)),
      linear-gradient(180deg, rgba(77,163,255,0.08), rgba(77,163,255,0.00)),
      #12141a;
    border:1px solid rgba(255,255,255,0.16);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -1px 0 rgba(0,0,0,0.32),
      0 8px 20px rgba(0,0,0,0.22);
    padding:0;
    transition:
      background 0.18s ease,
      border-color 0.18s ease,
      transform 0.08s ease,
      filter 0.08s ease,
      opacity 0.18s ease,
      box-shadow 0.18s ease;
  }

  .image-btn::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:inherit;
    pointer-events:none;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
    z-index:0;
  }

  .image-btn:active,
  .action-btn:active,
  .fs-close-btn:active{
    transform:scale(0.995);
    filter:brightness(0.97);
  }

  .image-btn:disabled,
  .action-btn:disabled{
    opacity:0.45;
    cursor:not-allowed;
  }

  .image-btn.empty{
    background:
      linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02)),
      linear-gradient(180deg, rgba(77,163,255,0.10), rgba(77,163,255,0.02)),
      #141821;
    border-color:rgba(255,255,255,0.18);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.07),
      inset 0 -1px 0 rgba(0,0,0,0.32),
      0 10px 24px rgba(0,0,0,0.24);
  }

  .image-btn.filled{
    background:
      linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.02)),
      linear-gradient(180deg, rgba(77,163,255,0.09), rgba(77,163,255,0.015)),
      #11151d;
    border-color:rgba(255,255,255,0.17);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -1px 0 rgba(0,0,0,0.32),
      0 10px 24px rgba(0,0,0,0.22);
  }

  .image-btn-inner{
    position:relative;
    z-index:1;
    width:100%;
    min-width:0;
    display:grid;
    grid-template-columns:auto 1fr;
    align-items:center;
    gap:10px;
  }

  .image-btn.empty .image-btn-inner{
    min-height:68px;
    padding:12px 14px 12px 14px;
  }

  .app.compact-images .image-btn.filled .image-btn-inner{
    min-height:48px;
    padding:6px 9px 6px 13px;
    gap:8px;
  }

  .app:not(.compact-images) .image-btn.filled .image-btn-inner{
    min-height:54px;
    padding:8px 10px 8px 14px;
  }

  .image-thumb,
  .image-empty-icon{
    width:38px;
    height:38px;
    border-radius:11px;
    overflow:hidden;
    flex:0 0 auto;
  }

  .image-thumb{
    background:#09090b;
    border:1px solid rgba(255,255,255,0.10);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 3px 10px rgba(0,0,0,0.28);
  }

  .image-thumb img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
  }

  .image-empty-icon{
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text);
  }

  .image-empty-icon svg{
    width:26.4px;
    height:26.4px;
    display:block;
    fill:currentColor;
    opacity:0.96;
  }

  .image-btn-text{
    min-width:0;
    text-align:left;
    display:grid;
    gap:2px;
  }

  .image-btn-main{
    color:var(--text);
    font-size:13px;
    line-height:1.2;
    font-weight:780;
    letter-spacing:-0.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .image-btn-sub{
    color:#a6b3c7;
    font-size:11px;
    line-height:1.15;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .image-btn.empty .image-btn-main{
    font-size:16px;
    font-weight:800;
    letter-spacing:-0.015em;
  }

  .image-meta{
    min-width:0;
    border-radius:16px;
    padding:10px 10px 8px;
    background:var(--card-2);
    border:1px solid var(--line);
    display:grid;
    align-content:center;
    gap:6px;
  }

  .app.compact-images .image-meta{
    padding:8px 10px 7px;
  }

  .meta-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
    min-width:0;
    font-size:11px;
    line-height:1.15;
  }

  .meta-key{
    color:var(--sub);
    flex:0 0 auto;
  }

  .meta-value{
    min-width:0;
    text-align:right;
    color:var(--text);
    word-break:break-word;
  }

  .meta-value.empty{
    color:transparent;
  }

  /* Actions */
  .actions{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    align-self:end;
  }

  .action-btn{
    appearance:none;
    border:none;
    height:48px;
    min-height:48px;
    border-radius:15px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    transition:
      transform 0.08s ease,
      filter 0.08s ease,
      opacity 0.18s ease;
  }

  .action-primary{
    background:var(--green);
    color:#07110a;
  }

  .action-danger{
    background:#2c1a1a;
    color:#ff8b84;
  }

  .hidden-input{
    display:none;
  }

  /* Fullscreen modal */
  .fs-modal{
    position:fixed;
    inset:0;
    background:#000000;
    z-index:9999;
    display:none;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    opacity:0;
    transition:opacity 0.3s ease;
    touch-action:none;
  }

  .fs-modal.active{
    display:flex;
    opacity:1;
  }

  .fs-close-btn{
    position:absolute;
    top:calc(env(safe-area-inset-top) + 20px);
    right:20px;
    width:38px;
    height:38px;
    border-radius:50%;
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    border:none;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10000;
    cursor:pointer;
  }

  .fs-image-wrapper{
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    transform-origin:center center;
    will-change:transform;
  }

  .fs-image{
    max-width:100%;
    max-height:100%;
    width:auto;
    height:auto;
    display:block;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
  }

  @media (max-width:380px){
    .app{
      padding:
        max(8px, env(safe-area-inset-top))
        10px
        max(8px, env(safe-area-inset-bottom))
        10px;
      gap:8px;
    }

    .diff-frame-wrap,
    .results-wrap,
    .images-wrap{
      padding:8px;
      gap:8px;
    }

    .metric-percent{
      font-size:clamp(17px, 5vw, 24px);
    }

    .metric-pixels{
      font-size:clamp(11px, 3.2vw, 14px);
    }

    .image-row{
      grid-template-columns:minmax(0, 1.36fr) minmax(82px, 0.84fr);
      gap:8px;
    }

    .image-btn.empty .image-btn-inner{
      min-height:62px;
      padding:11px 12px 11px 12px;
    }

    .app.compact-images .image-btn.filled .image-btn-inner{
      min-height:46px;
      padding:6px 8px 6px 12px;
      gap:7px;
    }

    .app:not(.compact-images) .image-btn.filled .image-btn-inner{
      min-height:50px;
      padding:7px 9px 7px 13px;
      gap:8px;
    }

    .image-thumb,
    .image-empty-icon{
      width:34px;
      height:34px;
    }

    .image-empty-icon svg{
      width:24.2px;
      height:24.2px;
    }

    .image-btn.empty .image-btn-main{
      font-size:15px;
    }

    .image-btn-main{
      font-size:12px;
    }

    .action-btn{
      height:46px;
      min-height:46px;
    }
  }
</style>
</head>
<body>
  <div id="app" class="app">

    <div class="frame">
      <div class="diff-frame-wrap">
        <div id="diffView" class="diff-view" aria-label="Comparison preview" role="button" tabindex="0">
          <div id="diffStage" class="diff-stage">
            <canvas id="diffCanvas"></canvas>
            <div id="diffPlaceholder" class="diff-placeholder">Difference image will appear here</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-top">
            <div id="statusText" class="status">Waiting for images…</div>
            <div id="percentText" class="percent">0%</div>
          </div>

          <div class="bar" aria-label="Comparison progress">
            <div id="barFill" class="bar-fill"></div>
          </div>

          <div class="progress-bottom">
            <div id="rowsText">0 / 0 rows</div>
            <div id="pixelsScannedText">0 pixels</div>
          </div>
        </div>
      </div>
    </div>

    <div class="frame">
      <div class="results-wrap">
        <div class="metric red">
          <p class="metric-label">Divergent Pixles</p>
          <div class="metric-values">
            <p id="divergentPercentValue" class="metric-percent">–</p>
            <p id="divergentPixelsValue" class="metric-pixels">–</p>
          </div>
        </div>

        <div class="metric green">
          <p class="metric-label">Convergent Pixels</p>
          <div class="metric-values">
            <p id="convergentPercentValue" class="metric-percent">–</p>
            <p id="convergentPixelsValue" class="metric-pixels">–</p>
          </div>
        </div>
      </div>
    </div>

    <div class="frame">
      <div class="images-wrap">

        <div class="image-row">
          <button id="pickBtnA" class="image-btn empty" type="button" aria-label="Choose Image A">
            <span class="image-btn-inner">
              <span class="image-empty-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 21.96 22.05" preserveAspectRatio="xMidYMid meet">
                  <path d="M5.31,22l13.33,0.05c2.2,0,3.32-1.11,3.32-3.28V5.33c0-2.17-1.11-3.28-3.32-3.28L5.31,2C3.11,2,2,3.11,2,5.28v13.44 C2,20.9,3.11,22,5.31,22z M5.34,20.49c-1.19,0-1.84-0.63-1.84-1.85V5.36c0-1.22,0.65-1.85,1.84-1.85l13.27,0.05 c1.17,0,1.83,0.64,1.83,1.85v13.28c0,1.23-0.66,1.85-1.83,1.85L5.34,20.49z M8.71,10.38c1.21,0,2.2-0.99,2.2-2.2 c0-1.21-0.99-2.21-2.2-2.21c-1.22,0-2.2,1-2.2,2.21C6.51,9.4,7.49,10.38,8.71,10.38z M4.43,21.06h14.83c1.52,0,2.24-1.08,2.24-2.98 l-5.23-6.17c-0.4-0.47-0.84-0.7-1.33-0.7c-0.49,0-0.91,0.22-1.32,0.68l-3.94,4.45l-1.62-1.87c-0.37-0.42-0.75-0.64-1.18-0.64 c-0.4,0-0.77,0.2-1.11,0.62L2.5,18.25C2.59,20.16,3.16,21.06,4.43,21.06z"/>
                </svg>
              </span>
              <span class="image-btn-text">
                <span class="image-btn-main">Choose Image A</span>
              </span>
            </span>
          </button>
          <input id="fileInputA" type="file" class="hidden-input" accept="image/*" />

          <div class="image-meta">
            <div class="meta-row">
              <div class="meta-key">Size</div>
              <div id="fileSizeA" class="meta-value empty"></div>
            </div>
            <div class="meta-row">
              <div class="meta-key">Res</div>
              <div id="fileResA" class="meta-value empty"></div>
            </div>
          </div>
        </div>

        <div class="image-row">
          <button id="pickBtnB" class="image-btn empty" type="button" aria-label="Choose Image B">
            <span class="image-btn-inner">
              <span class="image-empty-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 21.96 22.05" preserveAspectRatio="xMidYMid meet">
                  <path d="M5.31,22l13.33,0.05c2.2,0,3.32-1.11,3.32-3.28V5.33c0-2.17-1.11-3.28-3.32-3.28L5.31,2C3.11,2,2,3.11,2,5.28v13.44 C2,20.9,3.11,22,5.31,22z M5.34,20.49c-1.19,0-1.84-0.63-1.84-1.85V5.36c0-1.22,0.65-1.85,1.84-1.85l13.27,0.05 c1.17,0,1.83,0.64,1.83,1.85v13.28c0,1.23-0.66,1.85-1.83,1.85L5.34,20.49z M8.71,10.38c1.21,0,2.2-0.99,2.2-2.2 c0-1.21-0.99-2.21-2.2-2.21c-1.22,0-2.2,1-2.2,2.21C6.51,9.4,7.49,10.38,8.71,10.38z M4.43,21.06h14.83c1.52,0,2.24-1.08,2.24-2.98 l-5.23-6.17c-0.4-0.47-0.84-0.7-1.33-0.7c-0.49,0-0.91,0.22-1.32,0.68l-3.94,4.45l-1.62-1.87c-0.37-0.42-0.75-0.64-1.18-0.64 c-0.4,0-0.77,0.2-1.11,0.62L2.5,18.25C2.59,20.16,3.16,21.06,4.43,21.06z"/>
                </svg>
              </span>
              <span class="image-btn-text">
                <span class="image-btn-main">Choose Image B</span>
              </span>
            </span>
          </button>
          <input id="fileInputB" type="file" class="hidden-input" accept="image/*" />

          <div class="image-meta">
            <div class="meta-row">
              <div class="meta-key">Size</div>
              <div id="fileSizeB" class="meta-value empty"></div>
            </div>
            <div class="meta-row">
              <div class="meta-key">Res</div>
              <div id="fileResB" class="meta-value empty"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="actions">
      <button id="compareBtn" class="action-btn action-primary" type="button" disabled>Compare</button>
      <button id="resetBtn" class="action-btn action-danger" type="button">Reset</button>
    </div>
  </div>

  <div id="fsModal" class="fs-modal" aria-hidden="true">
    <button id="fsCloseBtn" class="fs-close-btn" type="button" aria-label="Close fullscreen viewer">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div id="fsWrapper" class="fs-image-wrapper">
      <canvas id="fsCanvas" class="fs-image" aria-label="Comparison image fullscreen"></canvas>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const app = document.getElementById("app");

  const pickBtnA = document.getElementById("pickBtnA");
  const pickBtnB = document.getElementById("pickBtnB");
  const fileInputA = document.getElementById("fileInputA");
  const fileInputB = document.getElementById("fileInputB");

  const fileSizeA = document.getElementById("fileSizeA");
  const fileResA  = document.getElementById("fileResA");

  const fileSizeB = document.getElementById("fileSizeB");
  const fileResB  = document.getElementById("fileResB");

  const statusText = document.getElementById("statusText");
  const percentText = document.getElementById("percentText");
  const barFill = document.getElementById("barFill");
  const rowsText = document.getElementById("rowsText");
  const pixelsScannedText = document.getElementById("pixelsScannedText");

  const divergentPercentValue = document.getElementById("divergentPercentValue");
  const divergentPixelsValue = document.getElementById("divergentPixelsValue");
  const convergentPercentValue = document.getElementById("convergentPercentValue");
  const convergentPixelsValue = document.getElementById("convergentPixelsValue");

  const compareBtn = document.getElementById("compareBtn");
  const resetBtn = document.getElementById("resetBtn");

  const diffView = document.getElementById("diffView");
  const diffStage = document.getElementById("diffStage");
  const diffCanvas = document.getElementById("diffCanvas");
  const diffPlaceholder = document.getElementById("diffPlaceholder");
  const diffCtx = diffCanvas.getContext("2d", { willReadFrequently: true, alpha: false });

  const fsModal = document.getElementById("fsModal");
  const fsCloseBtn = document.getElementById("fsCloseBtn");
  const fsWrapper = document.getElementById("fsWrapper");
  const fsCanvas = document.getElementById("fsCanvas");
  const fsCtx = fsCanvas.getContext("2d", { alpha: false });

  let imageStateA = null;
  let imageStateB = null;
  let isProcessing = false;
  let compareRunId = 0;

  const ROW_BATCH = 24;

  let matrixTransform = { x: 0, y: 0, scale: 1 };
  let initialPinchDistance = 0;
  let initialScale = 1;
  let lastPanPosition = { x: 0, y: 0 };

  pickBtnA.addEventListener("click", () => {
    if (!isProcessing) fileInputA.click();
  });

  pickBtnB.addEventListener("click", () => {
    if (!isProcessing) fileInputB.click();
  });

  fileInputA.addEventListener("change", async () => {
    if (isProcessing) return;
    const file = fileInputA.files?.[0] || null;
    imageStateA = await handleImageSelection(file, "A");
    updateCompactLayoutState();
    refreshCompareState();
    refreshIdleStatus();
  });

  fileInputB.addEventListener("change", async () => {
    if (isProcessing) return;
    const file = fileInputB.files?.[0] || null;
    imageStateB = await handleImageSelection(file, "B");
    updateCompactLayoutState();
    refreshCompareState();
    refreshIdleStatus();
  });

  compareBtn.addEventListener("click", async () => {
    if (!isProcessing && imageStateA && imageStateB) {
      await compareImages();
    }
  });

  resetBtn.addEventListener("click", () => {
    if (!isProcessing) resetAll();
  });

  diffView.addEventListener("click", () => {
    if (diffCanvas.width <= 1 || diffCanvas.height <= 1) return;
    openViewer();
  });

  diffView.addEventListener("keydown", (e) => {
    if ((e.key === "Enter" || e.key === " ") && diffCanvas.width > 1 && diffCanvas.height > 1) {
      e.preventDefault();
      openViewer();
    }
  });

  fsCloseBtn.addEventListener("click", closeViewer);

  fsModal.addEventListener("click", (e) => {
    if (e.target === fsModal) closeViewer();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && fsModal.classList.contains("active")) {
      closeViewer();
    }
  });

  if ("ResizeObserver" in window) {
    const ro = new ResizeObserver(() => {
      if (diffCanvas.width > 1 && diffCanvas.height > 1) {
        updateDiffStageSize(diffCanvas.width, diffCanvas.height);
      } else {
        resetDiffStageSize();
      }
    });
    ro.observe(diffView);
  } else {
    window.addEventListener("resize", () => {
      if (diffCanvas.width > 1 && diffCanvas.height > 1) {
        updateDiffStageSize(diffCanvas.width, diffCanvas.height);
      } else {
        resetDiffStageSize();
      }
    });
  }

  async function handleImageSelection(file, which) {
    resetComparisonOutputs();

    if (!file) {
      revokeImageStateURL(which === "A" ? imageStateA : imageStateB);
      clearImageUI(which);
      return null;
    }

    try {
      revokeImageStateURL(which === "A" ? imageStateA : imageStateB);

      const loaded = await loadImageFromFile(file);
      setImageUI(which, file, loaded);

      return {
        file,
        img: loaded.img,
        url: loaded.url,
        width: loaded.img.naturalWidth,
        height: loaded.img.naturalHeight
      };
    } catch (error) {
      console.error(error);
      clearImageUI(which);
      setStatus("Failed to load image");
      return null;
    }
  }

  function loadImageFromFile(file) {
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();

      img.onload = async () => {
        try {
          if (typeof img.decode === "function") {
            await img.decode().catch(() => {});
          }

          if (!img.naturalWidth || !img.naturalHeight) {
            URL.revokeObjectURL(url);
            reject(new Error("Invalid image dimensions"));
            return;
          }

          resolve({ img, url });
        } catch (error) {
          URL.revokeObjectURL(url);
          reject(error);
        }
      };

      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error("Image load failed"));
      };

      img.src = url;
    });
  }

  async function compareImages() {
    if (!imageStateA || !imageStateB || isProcessing) return;

    const thisRunId = ++compareRunId;
    isProcessing = true;
    setButtonsDuringProcessing(true);
    resetComparisonOutputs();

    const widthA = imageStateA.width;
    const heightA = imageStateA.height;
    const widthB = imageStateB.width;
    const heightB = imageStateB.height;

    if (widthA !== widthB || heightA !== heightB) {
      setStatus("Resolution mismatch");
      percentText.textContent = "0%";
      barFill.style.width = "0%";
      rowsText.textContent = "0 / 0 rows";
      pixelsScannedText.textContent = "0 pixels";
      setNoResultsDisplay();
      setIdleDiffCanvas();
      isProcessing = false;
      setButtonsDuringProcessing(false);
      refreshCompareState();
      return;
    }

    try {
      setStatus("Preparing comparison…");
      rowsText.textContent = `0 / ${heightA} rows`;
      pixelsScannedText.textContent = "0 pixels";

      const imageDataA = getImageDataFromImage(imageStateA.img);
      const imageDataB = getImageDataFromImage(imageStateB.img);

      const dataA = imageDataA.data;
      const dataB = imageDataB.data;

      const diffImage = new ImageData(widthA, heightA);
      const diffData = diffImage.data;

      const totalPixels = widthA * heightA;
      let differingPixels = 0;
      let y = 0;

      diffCanvas.width = widthA;
      diffCanvas.height = heightA;
      diffPlaceholder.style.display = "none";
      updateDiffStageSize(widthA, heightA);

      while (y < heightA) {
        if (thisRunId !== compareRunId) return;

        const batchEnd = Math.min(y + ROW_BATCH, heightA);

        for (; y < batchEnd; y++) {
          let rowIndex = y * widthA * 4;

          for (let x = 0; x < widthA; x++, rowIndex += 4) {
            const different =
              dataA[rowIndex]     !== dataB[rowIndex] ||
              dataA[rowIndex + 1] !== dataB[rowIndex + 1] ||
              dataA[rowIndex + 2] !== dataB[rowIndex + 2] ||
              dataA[rowIndex + 3] !== dataB[rowIndex + 3];

            if (different) {
              differingPixels++;
              diffData[rowIndex]     = 255;
              diffData[rowIndex + 1] = 0;
              diffData[rowIndex + 2] = 0;
              diffData[rowIndex + 3] = 255;
            } else {
              diffData[rowIndex]     = 50;
              diffData[rowIndex + 1] = 215;
              diffData[rowIndex + 2] = 75;
              diffData[rowIndex + 3] = 255;
            }
          }
        }

        diffCtx.putImageData(diffImage, 0, 0);

        const scannedPixels = Math.min(y * widthA, totalPixels);
        const progress = totalPixels > 0 ? (scannedPixels / totalPixels) * 100 : 100;

        setStatus("Comparing pixels…");
        percentText.textContent = `${progress.toFixed(1)}%`;
        barFill.style.width = `${progress}%`;
        rowsText.textContent = `${y} / ${heightA} rows`;
        pixelsScannedText.textContent = `${formatNumber(scannedPixels)} pixels`;

        await nextFrame();
      }

      const convergentPixels = totalPixels - differingPixels;
      const divergentPercent = totalPixels === 0 ? 0 : (differingPixels / totalPixels) * 100;
      const convergentPercent = totalPixels === 0 ? 100 : (convergentPixels / totalPixels) * 100;

      if (differingPixels === 0) {
        setStatus("Perfect Match", "success");
      } else {
        setStatus("Differenses found", "error");
      }

      percentText.textContent = "100%";
      barFill.style.width = "100%";
      rowsText.textContent = `${heightA} / ${heightA} rows`;
      pixelsScannedText.textContent = `${formatNumber(totalPixels)} pixels`;

      divergentPercentValue.textContent = `${divergentPercent.toFixed(4)}%`;
      divergentPixelsValue.textContent = `${formatNumber(differingPixels)} px`;

      convergentPercentValue.textContent = `${convergentPercent.toFixed(4)}%`;
      convergentPixelsValue.textContent = `${formatNumber(convergentPixels)} px`;

      if (fsModal.classList.contains("active")) {
        syncFullscreenCanvas();
      }
    } catch (error) {
      console.error(error);
      setStatus("Comparison failed");
      setNoResultsDisplay();
      setIdleDiffCanvas();
    } finally {
      isProcessing = false;
      setButtonsDuringProcessing(false);
      refreshCompareState();
    }
  }

  function getImageDataFromImage(img) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true, alpha: true });

    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);

    return ctx.getImageData(0, 0, canvas.width, canvas.height);
  }

  function setImageUI(which, file, loaded) {
    const btn = which === "A" ? pickBtnA : pickBtnB;
    const sizeEl = which === "A" ? fileSizeA : fileSizeB;
    const resEl = which === "A" ? fileResA : fileResB;

    btn.classList.remove("empty");
    btn.classList.add("filled");

    const shortName = escapeHtml(shortenFilename(file.name));
    const label = which === "A" ? "Image A" : "Image B";
    const safeSrc = loaded.url.replace(/"/g, "&quot;");

    btn.innerHTML = `
      <span class="image-btn-inner">
        <span class="image-thumb">
          <img src="${safeSrc}" alt="">
        </span>
        <span class="image-btn-text">
          <span class="image-btn-main">${shortName}</span>
          <span class="image-btn-sub">${label}</span>
        </span>
      </span>
    `;

    sizeEl.textContent = formatBytes(file.size);
    resEl.textContent = `${loaded.img.naturalWidth} × ${loaded.img.naturalHeight}`;
    sizeEl.classList.remove("empty");
    resEl.classList.remove("empty");
  }

  function clearImageUI(which) {
    const btn = which === "A" ? pickBtnA : pickBtnB;
    const sizeEl = which === "A" ? fileSizeA : fileSizeB;
    const resEl = which === "A" ? fileResA : fileResB;

    btn.classList.remove("filled");
    btn.classList.add("empty");
    btn.innerHTML = `
      <span class="image-btn-inner">
        <span class="image-empty-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 21.96 22.05" preserveAspectRatio="xMidYMid meet">
            <path d="M5.31,22l13.33,0.05c2.2,0,3.32-1.11,3.32-3.28V5.33c0-2.17-1.11-3.28-3.32-3.28L5.31,2C3.11,2,2,3.11,2,5.28v13.44 C2,20.9,3.11,22,5.31,22z M5.34,20.49c-1.19,0-1.84-0.63-1.84-1.85V5.36c0-1.22,0.65-1.85,1.84-1.85l13.27,0.05 c1.17,0,1.83,0.64,1.83,1.85v13.28c0,1.23-0.66,1.85-1.83,1.85L5.34,20.49z M8.71,10.38c1.21,0,2.2-0.99,2.2-2.2 c0-1.21-0.99-2.21-2.2-2.21c-1.22,0-2.2,1-2.2,2.21C6.51,9.4,7.49,10.38,8.71,10.38z M4.43,21.06h14.83c1.52,0,2.24-1.08,2.24-2.98 l-5.23-6.17c-0.4-0.47-0.84-0.7-1.33-0.7c-0.49,0-0.91,0.22-1.32,0.68l-3.94,4.45l-1.62-1.87c-0.37-0.42-0.75-0.64-1.18-0.64 c-0.4,0-0.77,0.2-1.11,0.62L2.5,18.25C2.59,20.16,3.16,21.06,4.43,21.06z"/>
          </svg>
        </span>
        <span class="image-btn-text">
          <span class="image-btn-main">${which === "A" ? "Choose Image A" : "Choose Image B"}</span>
        </span>
      </span>
    `;

    sizeEl.textContent = "";
    resEl.textContent = "";
    sizeEl.classList.add("empty");
    resEl.classList.add("empty");
  }

  function updateCompactLayoutState() {
    if (imageStateA && imageStateB) {
      app.classList.add("compact-images");
    } else {
      app.classList.remove("compact-images");
    }
  }

  function refreshCompareState() {
    compareBtn.disabled = !(imageStateA && imageStateB) || isProcessing;
  }

  function setButtonsDuringProcessing(active) {
    pickBtnA.disabled = active;
    pickBtnB.disabled = active;
    compareBtn.disabled = active || !(imageStateA && imageStateB);
    resetBtn.disabled = active;
  }

  function clearStatusColor() {
    statusText.classList.remove("status-success", "status-error");
  }

  function setStatus(text, tone = "") {
    statusText.textContent = text;
    clearStatusColor();
    if (tone === "success") statusText.classList.add("status-success");
    if (tone === "error") statusText.classList.add("status-error");
  }

  function refreshIdleStatus() {
    if (isProcessing) return;

    if (imageStateA && imageStateB) {
      setStatus("Ready to compare");
    } else if (imageStateA || imageStateB) {
      setStatus("Select the second image");
    } else {
      setStatus("Waiting for images…");
    }
  }

  function setNoResultsDisplay() {
    divergentPercentValue.textContent = "–";
    divergentPixelsValue.textContent = "–";
    convergentPercentValue.textContent = "–";
    convergentPixelsValue.textContent = "–";
  }

  function resetComparisonOutputs() {
    refreshIdleStatus();
    percentText.textContent = "0%";
    barFill.style.width = "0%";
    rowsText.textContent = "0 / 0 rows";
    pixelsScannedText.textContent = "0 pixels";
    setNoResultsDisplay();
    setIdleDiffCanvas();
  }

  function setIdleDiffCanvas() {
    diffCanvas.width = 1;
    diffCanvas.height = 1;
    diffCtx.clearRect(0, 0, 1, 1);
    diffPlaceholder.style.display = "flex";
    resetDiffStageSize();
    clearFullscreenImage();
  }

  function resetAll() {
    compareRunId++;

    fileInputA.value = "";
    fileInputB.value = "";

    revokeImageStateURL(imageStateA);
    revokeImageStateURL(imageStateB);

    imageStateA = null;
    imageStateB = null;
    isProcessing = false;

    clearImageUI("A");
    clearImageUI("B");
    updateCompactLayoutState();
    resetComparisonOutputs();

    compareBtn.disabled = true;
    resetBtn.disabled = false;
    closeViewer();
  }

  function revokeImageStateURL(state) {
    if (state?.url) {
      URL.revokeObjectURL(state.url);
    }
  }

  function updateDiffStageSize(sourceWidth, sourceHeight) {
    const maxWidth = diffView.clientWidth;
    const maxHeight = diffView.clientHeight;

    if (!maxWidth || !maxHeight || !sourceWidth || !sourceHeight) {
      resetDiffStageSize();
      return;
    }

    const aspect = sourceWidth / sourceHeight;

    let fittedWidth = maxWidth;
    let fittedHeight = fittedWidth / aspect;

    if (fittedHeight > maxHeight) {
      fittedHeight = maxHeight;
      fittedWidth = fittedHeight * aspect;
    }

    diffStage.style.width = `${Math.max(1, Math.round(fittedWidth))}px`;
    diffStage.style.height = `${Math.max(1, Math.round(fittedHeight))}px`;
  }

  function resetDiffStageSize() {
    diffStage.style.width = "100%";
    diffStage.style.height = "100%";
  }

  /* Fullscreen viewer */

  function syncFullscreenCanvas() {
    if (diffCanvas.width <= 1 || diffCanvas.height <= 1) return;

    fsCanvas.width = diffCanvas.width;
    fsCanvas.height = diffCanvas.height;

    fsCtx.clearRect(0, 0, fsCanvas.width, fsCanvas.height);
    fsCtx.drawImage(diffCanvas, 0, 0);
  }

  function openViewer() {
    if (diffCanvas.width <= 1 || diffCanvas.height <= 1) return;

    syncFullscreenCanvas();
    fsModal.classList.add("active");
    fsModal.setAttribute("aria-hidden", "false");

    matrixTransform = { x: 0, y: 0, scale: 1 };
    applyTransform();
  }

  function closeViewer() {
    fsModal.classList.remove("active");
    fsModal.setAttribute("aria-hidden", "true");
    initialPinchDistance = 0;
    initialScale = 1;
    lastPanPosition = { x: 0, y: 0 };
    matrixTransform = { x: 0, y: 0, scale: 1 };
    applyTransform();
  }

  function clearFullscreenImage() {
    fsCanvas.width = 1;
    fsCanvas.height = 1;
    fsCtx.clearRect(0, 0, 1, 1);

    matrixTransform = { x: 0, y: 0, scale: 1 };
    applyTransform();
  }

  function applyTransform() {
    matrixTransform.scale = Math.max(1, Math.min(15, matrixTransform.scale));

    if (matrixTransform.scale === 1) {
      matrixTransform.x = 0;
      matrixTransform.y = 0;
    }

    fsWrapper.style.transform =
      `translate(${matrixTransform.x}px, ${matrixTransform.y}px) scale(${matrixTransform.scale})`;
  }

  fsModal.addEventListener("touchstart", (e) => {
    if (!fsModal.classList.contains("active")) return;

    if (e.touches.length === 2) {
      initialPinchDistance = Math.hypot(
        e.touches[0].pageX - e.touches[1].pageX,
        e.touches[0].pageY - e.touches[1].pageY
      );
      initialScale = matrixTransform.scale;
    } else if (e.touches.length === 1) {
      lastPanPosition = {
        x: e.touches[0].pageX,
        y: e.touches[0].pageY
      };
    }
  }, { passive: true });

  fsModal.addEventListener("touchmove", (e) => {
    if (!fsModal.classList.contains("active")) return;

    e.preventDefault();

    if (e.touches.length === 2) {
      const currentDistance = Math.hypot(
        e.touches[0].pageX - e.touches[1].pageX,
        e.touches[0].pageY - e.touches[1].pageY
      );

      if (initialPinchDistance > 0) {
        matrixTransform.scale = initialScale * (currentDistance / initialPinchDistance);
        applyTransform();
      }
    } else if (e.touches.length === 1 && matrixTransform.scale > 1) {
      const dx = e.touches[0].pageX - lastPanPosition.x;
      const dy = e.touches[0].pageY - lastPanPosition.y;

      matrixTransform.x += dx / matrixTransform.scale;
      matrixTransform.y += dy / matrixTransform.scale;

      lastPanPosition = {
        x: e.touches[0].pageX,
        y: e.touches[0].pageY
      };

      applyTransform();
    }
  }, { passive: false });

  function shortenFilename(name, front = 7, back = 8) {
    const str = String(name || "");
    if (str.length <= front + back + 3) return str;
    return `${str.slice(0, front)}...${str.slice(-back)}`;
  }

  function formatBytes(bytes) {
    if (!Number.isFinite(bytes) || bytes < 0) return "0 B";
    if (bytes === 0) return "0 B";

    const units = ["B", "KB", "MB", "GB", "TB"];
    const exp = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
    const value = bytes / Math.pow(1024, exp);

    if (exp === 0) return `${value.toFixed(0)} ${units[exp]}`;
    if (value >= 100) return `${value.toFixed(0)} ${units[exp]}`;
    if (value >= 10) return `${value.toFixed(1)} ${units[exp]}`;
    return `${value.toFixed(2)} ${units[exp]}`;
  }

  function formatNumber(num) {
    return new Intl.NumberFormat("en-US").format(num);
  }

  function nextFrame() {
    return new Promise(resolve => requestAnimationFrame(resolve));
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  resetAll();
})();
</script>
</body>
