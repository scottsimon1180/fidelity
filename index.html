<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <link rel="apple-touch-icon" href="icon-IOS.png">
  
  <title>Matrix Comparator</title>
  <style>
    :root{
      --ios-bg:#f2f2f7;
      --ios-text:#1c1c1e;
      --ios-sub:#8e8e93;
      --ios-sep:rgba(60,60,67,.18);
      --ios-card:#ffffff;
      --ios-shadow:0 20px 60px rgba(0,0,0,.22);
      --ios-blue:#007aff;
      --ios-green:#34c759;
      --ios-red:#ff3b30;
      --ios-btn:rgba(120,120,128,.18);
      --ios-btn-press:rgba(120,120,128,.30);
      --toggle-border: #000000;
      --toggle-color:  #000000;
      --map-bg: #808080;
    }

    html, body{
      height:100%; width:100%; overflow:hidden; position:fixed; touch-action:none; -webkit-user-select:none;
    }
    body{
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display:flex; flex-direction:column; align-items:center;
      padding:calc(env(safe-area-inset-top) + 20px) 20px 30px; margin:0;
      background-color:var(--ios-bg); color:var(--ios-text); box-sizing:border-box;
      transition: background-color 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @media (prefers-color-scheme: dark){
      :root{
        --ios-bg:#000000; --ios-text:#f2f2f7; --ios-sub:#8e8e93;
        --ios-sep:rgba(84,84,88,.55); --ios-card:#1c1c1e;
        --ios-shadow:0 26px 80px rgba(0,0,0,.55);
        --ios-btn:rgba(120,120,128,.24); --ios-btn-press:rgba(120,120,128,.36);
        --toggle-border: #f2f2f7; --toggle-color:  #f2f2f7;
        --map-bg: #636366;
      }
      .section-label, .sub-label, .status{ color:var(--ios-sub); }
      .btn{ background:#2563eb; color:#fff; }
      .panel{ background:#0b0b0c; border:1px solid #1f1f22; }
      .file-row .row-label{ color:var(--ios-sub); }
      .results-panel { background:#1c1c1e; border:1px solid #1f1f22; }
      .tb-btn { color: #8e8e93 !important; }
      .tb-btn.tb-toggle-selected { background: rgba(255,255,255,.08); box-shadow: inset 0 2px 5px rgba(0,0,0,.4) !important; }
    }

    .preview-row{ width:100%; flex: 1; position:relative; margin-bottom:14px; border-radius:16px; overflow:hidden; box-shadow: inset 0 0 0 1px var(--ios-sep); background-color: var(--map-bg); flex-shrink: 0; cursor: pointer; }
    .visualizer-container{ width:100%; height:100%; display:flex; justify-content:center; align-items:center; }
    #diffCanvas { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; pointer-events: none; }

    .bottom-controls { width: 100%; display: flex; flex-direction: column; gap: 14px; flex-shrink: 0; }
    
    .results-panel { width: 100%; background: var(--ios-card); border: 1px solid var(--ios-sep); border-radius: 16px; padding: 16px; box-sizing: border-box; display: flex; justify-content: space-evenly; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); opacity: 0.4; transition: opacity 0.3s ease; }
    .results-panel.active { opacity: 1; }
    .metric { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .metric-val { font-size: 22px; font-weight: 800; color: var(--ios-text); font-variant-numeric: tabular-nums; }
    .metric-lbl { font-size: 11px; font-weight: 700; color: var(--ios-sub); text-transform: uppercase; letter-spacing: 0.8px; }

    #valFidelity { color: var(--ios-green) !important; }

    .panel{ width:100%; background:rgba(255,255,255,.55); border:1px solid rgba(0,0,0,.06); border-radius:16px; padding:14px; box-sizing:border-box; backdrop-filter:blur(10px); }
    .file-list{ display:flex; flex-direction:column; gap:12px; width:100%; }
    .file-row{ display:flex; align-items:center; gap:12px; width:100%; }
    .file-row .row-label{ width:80px; font-size:13px; font-weight:800; color:#64748b; text-transform:uppercase; letter-spacing:.6px; flex:0 0 auto; }
    
    .file-trigger { flex: 1 1 auto; height: 44px; border: 1px solid var(--ios-sep); border-radius: 10px; background: var(--ios-btn); color: var(--ios-text); font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 10px; box-shadow: 0 1px 2px rgba(0,0,0,.04); cursor: pointer; }
    .file-trigger:active { transform: scale(.98); background: var(--ios-btn-press); box-shadow: none; }
    .file-preview-thumb { width: 28px; height: 28px; border-radius: 4px; margin-right: 8px; border: 1px solid var(--ios-sep); object-fit: cover; display: none; }
    
    .toolbar{ width: 100%; margin-top: 14px; display:flex; justify-content: space-between; gap: 10px; }
    .tb-btn{ flex: 1 1 0; height: 44px; border: 1px solid var(--ios-sep); border-radius: 10px; background: var(--ios-btn); color: #85858B; display:flex; align-items:center; justify-content:center; font-weight: 700; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04); cursor: pointer; }
    .tb-btn:active{ transform: scale(.97); background: var(--ios-btn-press); box-shadow: none; }
    .tb-btn.tb-toggle-selected{ border-color: var(--toggle-border); color: var(--toggle-color); background: rgba(0,0,0,.05); box-shadow: inset 0 2px 4px rgba(0,0,0,.08); }

    .btn{ width:100%; border:none; border-radius:14px; padding:16px; font-weight:800; font-size:18px; background:#2563eb; color:#fff; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
    .btn:active{ transform:scale(.98); }
    .btn:disabled{ background: var(--ios-btn); color: var(--ios-sub); box-shadow: none; transform: none; }
    
    .hidden { display: none !important; }

    /* --- Fullscreen Interactive Viewer --- */
    .fs-modal { position: fixed; inset: 0; background: #000000; z-index: 9999; display: none; justify-content: center; align-items: center; overflow: hidden; opacity: 0; transition: opacity 0.3s ease; }
    .fs-modal.active { display: flex; opacity: 1; }
    .fs-close-btn { position: absolute; top: calc(env(safe-area-inset-top) + 20px); right: 20px; width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: none; color: white; display: flex; align-items: center; justify-content: center; z-index: 10000; cursor: pointer; }
    .fs-close-btn:active { transform: scale(0.92); }
    .fs-image-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transform-origin: center center; }
    .fs-image { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: pixelated; }
  </style>
</head>
<body>

  <div class="preview-row" id="previewRow" aria-label="Tap to view fullscreen">
    <div class="visualizer-container">
      <canvas id="diffCanvas"></canvas>
    </div>
  </div>

  <div class="bottom-controls">
    
    <div class="results-panel" id="resultsPanel">
      <div class="metric">
        <div class="metric-val" id="valPixels">-</div>
        <div class="metric-lbl">Deviant Pixels</div>
      </div>
      <div class="metric">
        <div class="metric-val" id="valFidelity">-</div>
        <div class="metric-lbl">Fidelity</div>
      </div>
    </div>

    <div class="panel">
      <div class="file-list">
        <div class="file-row">
          <div class="row-label">Matrix A</div>
          <div class="file-trigger" id="triggerA">
            <img class="file-preview-thumb" id="thumbA" src="" alt="">
            <span id="labelA">Select Reference...</span>
          </div>
          <input type="file" id="inputA" accept="image/*" class="hidden">
        </div>
        
        <div class="file-row">
          <div class="row-label">Matrix B</div>
          <div class="file-trigger" id="triggerB">
            <img class="file-preview-thumb" id="thumbB" src="" alt="">
            <span id="labelB">Select Target...</span>
          </div>
          <input type="file" id="inputB" accept="image/*" class="hidden">
        </div>
      </div>

      <div class="toolbar">
        <button class="tb-btn tb-toggle-selected" id="modeExact" type="button">Exact Match</button>
        <button class="tb-btn" id="modePerceptual" type="button">Tolerance (5%)</button>
      </div>
    </div>

    <button class="btn" id="executeBtn" type="button" disabled>Awaiting Matrices</button>
  </div>

  <div class="fs-modal" id="fsModal">
    <button class="fs-close-btn" id="fsCloseBtn">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="fs-image-wrapper" id="fsWrapper">
      <img src="" id="fsImage" class="fs-image" alt="Divergence Map">
    </div>
  </div>

  <canvas id="ctxA" class="hidden"></canvas>
  <canvas id="ctxB" class="hidden"></canvas>

  <script>
    "use strict";

    // --- DOM Referencing ---
    const inputA = document.getElementById('inputA');
    const inputB = document.getElementById('inputB');
    const triggerA = document.getElementById('triggerA');
    const triggerB = document.getElementById('triggerB');
    const labelA = document.getElementById('labelA');
    const labelB = document.getElementById('labelB');
    const thumbA = document.getElementById('thumbA');
    const thumbB = document.getElementById('thumbB');
    
    const previewRow = document.getElementById('previewRow');
    const diffCanvas = document.getElementById('diffCanvas');
    const cvsA = document.getElementById('ctxA');
    const cvsB = document.getElementById('ctxB');
    
    const executeBtn = document.getElementById('executeBtn');
    
    const resultsPanel = document.getElementById('resultsPanel');
    const valPixels = document.getElementById('valPixels');
    const valFidelity = document.getElementById('valFidelity');

    const modeExact = document.getElementById('modeExact');
    const modePerceptual = document.getElementById('modePerceptual');

    // Fullscreen View Elements
    const fsModal = document.getElementById('fsModal');
    const fsCloseBtn = document.getElementById('fsCloseBtn');
    const fsImage = document.getElementById('fsImage');
    const fsWrapper = document.getElementById('fsWrapper');

    // --- State Variables ---
    let imgA = null;
    let imgB = null;
    let useTolerance = false;
    let hasAnalyzedData = false;
    const TOLERANCE_THRESHOLD = 32;

    // --- UI State Management ---
    modeExact.addEventListener('click', () => {
      useTolerance = false;
      modeExact.classList.add('tb-toggle-selected');
      modePerceptual.classList.remove('tb-toggle-selected');
    });

    modePerceptual.addEventListener('click', () => {
      useTolerance = true;
      modePerceptual.classList.add('tb-toggle-selected');
      modeExact.classList.remove('tb-toggle-selected');
    });

    triggerA.addEventListener('click', () => inputA.click());
    triggerB.addEventListener('click', () => inputB.click());

    // --- Asynchronous File Parsing ---
    function handleFileUpload(fileInput, thumbEl, labelEl, callback) {
      const file = fileInput.files[0];
      if (!file) return;

      labelEl.textContent = file.name;
      
      // Reset environmental styling
      document.body.style.backgroundColor = '';
      resultsPanel.classList.remove('active');
      hasAnalyzedData = false;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          thumbEl.src = img.src;
          thumbEl.style.display = 'block';
          callback(img);
          verifyDimensionality();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    inputA.addEventListener('change', () => handleFileUpload(inputA, thumbA, labelA, (img) => imgA = img));
    inputB.addEventListener('change', () => handleFileUpload(inputB, thumbB, labelB, (img) => imgB = img));

    function verifyDimensionality() {
      if (imgA && imgB) {
        if (imgA.width !== imgB.width || imgA.height !== imgB.height) {
          executeBtn.disabled = true;
          executeBtn.textContent = `Error: A(${imgA.width}x${imgA.height}) vs B(${imgB.width}x${imgB.height})`;
        } else {
          executeBtn.disabled = false;
          executeBtn.textContent = "Execute Comparison";
        }
      }
    }

    // --- Analytical Processor ---
    executeBtn.addEventListener('click', async () => {
      executeBtn.disabled = true;
      executeBtn.textContent = "Computing Divergence...";
      
      await new Promise(resolve => setTimeout(resolve, 50));

      const width = imgA.width;
      const height = imgA.height;

      cvsA.width = cvsB.width = diffCanvas.width = width;
      cvsA.height = cvsB.height = diffCanvas.height = height;

      const ctxA = cvsA.getContext('2d', { willReadFrequently: true });
      const ctxB = cvsB.getContext('2d', { willReadFrequently: true });
      const ctxDiff = diffCanvas.getContext('2d');

      ctxA.drawImage(imgA, 0, 0);
      ctxB.drawImage(imgB, 0, 0);

      const dataA = ctxA.getImageData(0, 0, width, height).data;
      const dataB = ctxB.getImageData(0, 0, width, height).data;
      const imgDataDiff = ctxDiff.createImageData(width, height);
      const dataDiff = imgDataDiff.data;

      let differenceCount = 0;
      const len = dataA.length;

      for (let i = 0; i < len; i += 4) {
        let isIdentical = false;

        if (useTolerance) {
          const dR = dataA[i] - dataB[i];
          const dG = dataA[i+1] - dataB[i+1];
          const dB = dataA[i+2] - dataB[i+2];
          const distance = Math.sqrt((dR*dR) + (dG*dG) + (dB*dB));
          isIdentical = distance <= TOLERANCE_THRESHOLD;
        } else {
          isIdentical = 
            dataA[i] === dataB[i] &&
            dataA[i+1] === dataB[i+1] &&
            dataA[i+2] === dataB[i+2] &&
            dataA[i+3] === dataB[i+3];
        }

        if (isIdentical) {
          dataDiff[i] = 0;
          dataDiff[i+1] = 0;
          dataDiff[i+2] = 0;
          dataDiff[i+3] = 255;
        } else {
          dataDiff[i] = 255;
          dataDiff[i+1] = 0;
          dataDiff[i+2] = 255;
          dataDiff[i+3] = 255;
          differenceCount++;
        }
      }

      ctxDiff.putImageData(imgDataDiff, 0, 0);
      hasAnalyzedData = true;

      // --- Data Telemetry Output ---
      resultsPanel.classList.add('active');
      const total = width * height;
      
      const sameCount = total - differenceCount;
      const fidelityScore = (sameCount / total) * 100;
      valFidelity.textContent = fidelityScore.toFixed(4) + "%";

      if (differenceCount === 0) {
        valPixels.textContent = "0";
        valPixels.style.color = "var(--ios-green)";
      } else {
        valPixels.textContent = differenceCount.toLocaleString();
        valPixels.style.color = "var(--ios-red)";
      }

      const hue = Math.max(0, Math.min(120, (fidelityScore / 100) * 120));
      document.body.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;

      executeBtn.disabled = false;
      executeBtn.textContent = "Re-Execute Comparison";
    });

    // --- Interactive Fullscreen Matrix Viewer ---
    let matrixTransform = { x: 0, y: 0, scale: 1 };
    let initialPinchDistance = 0;
    let initialScale = 1;
    let lastPanPosition = { x: 0, y: 0 };

    function applyTransform() {
      // Bound scaling between 1x and 15x
      matrixTransform.scale = Math.max(1, Math.min(15, matrixTransform.scale));
      
      // If scale is 1, reset translation to lock it back to origin
      if (matrixTransform.scale === 1) {
        matrixTransform.x = 0;
        matrixTransform.y = 0;
      }
      
      fsWrapper.style.transform = `translate(${matrixTransform.x}px, ${matrixTransform.y}px) scale(${matrixTransform.scale})`;
    }

    // Initialize Viewer
    previewRow.addEventListener('click', () => {
      if (!hasAnalyzedData) return;
      fsImage.src = diffCanvas.toDataURL('image/png');
      fsModal.classList.add('active');
      matrixTransform = { x: 0, y: 0, scale: 1 };
      applyTransform();
    });

    // Terminate Viewer
    fsCloseBtn.addEventListener('click', () => {
      fsModal.classList.remove('active');
    });

    // Handle Hardware Gestures
    fsModal.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        // Init pinch-to-zoom
        initialPinchDistance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX, 
          e.touches[0].pageY - e.touches[1].pageY
        );
        initialScale = matrixTransform.scale;
      } else if (e.touches.length === 1) {
        // Init pan tracking
        lastPanPosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
      }
    });

    fsModal.addEventListener('touchmove', (e) => {
      e.preventDefault(); // Prevent native browser scrolling/bouncing

      if (e.touches.length === 2) {
        // Compute matrix scale differential
        const currentDistance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX, 
          e.touches[0].pageY - e.touches[1].pageY
        );
        matrixTransform.scale = initialScale * (currentDistance / initialPinchDistance);
        applyTransform();
        
      } else if (e.touches.length === 1 && matrixTransform.scale > 1) {
        // Compute matrix translation differential
        const dx = e.touches[0].pageX - lastPanPosition.x;
        const dy = e.touches[0].pageY - lastPanPosition.y;
        
        // Adjust panning speed relative to current scale for 1:1 mapping
        matrixTransform.x += dx / matrixTransform.scale;
        matrixTransform.y += dy / matrixTransform.scale;
        
        lastPanPosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
        applyTransform();
      }
    }, { passive: false });

  </script>
</body>
</html>
