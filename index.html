<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-IOS.png">

  <title>Pixel Compare</title>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app">

    <div class="frame">
      <div class="diff-frame-wrap">
        <div id="diffView" class="diff-view" aria-label="Comparison preview" role="button" tabindex="0">
          <div id="diffStage" class="diff-stage">
            <canvas id="diffCanvas"></canvas>
            <div id="diffPlaceholder" class="diff-placeholder">Difference image will appear here</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-top">
            <div id="statusText" class="status">Waiting for images…</div>
            <div id="percentText" class="percent">0%</div>
          </div>

          <div class="bar" aria-label="Comparison progress">
            <div id="barFill" class="bar-fill"></div>
          </div>

          <div class="progress-bottom">
            <div id="rowsText">0 / 0 rows</div>
            <div id="pixelsScannedText">0 pixels</div>
          </div>
        </div>
      </div>
    </div>

    <div class="frame">
      <div class="results-wrap">
        <div class="metric red">
          <p class="metric-label">Divergent Pixles</p>
          <div class="metric-values">
            <p id="divergentPercentValue" class="metric-percent">–</p>
            <p id="divergentPixelsValue" class="metric-pixels">–</p>
          </div>
        </div>

        <div class="metric green">
          <p class="metric-label">Convergent Pixels</p>
          <div class="metric-values">
            <p id="convergentPercentValue" class="metric-percent">–</p>
            <p id="convergentPixelsValue" class="metric-pixels">–</p>
          </div>
        </div>
      </div>
    </div>

    <div class="frame">
      <div class="images-wrap">

        <div class="image-row">
          <button id="pickBtnA" class="image-btn empty" type="button" aria-label="Choose Image A">
            <span class="image-btn-inner">
              <span class="image-empty-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 21.96 22.05" preserveAspectRatio="xMidYMid meet">
                  <path d="M5.31,22l13.33,0.05c2.2,0,3.32-1.11,3.32-3.28V5.33c0-2.17-1.11-3.28-3.32-3.28L5.31,2C3.11,2,2,3.11,2,5.28v13.44 C2,20.9,3.11,22,5.31,22z M5.34,20.49c-1.19,0-1.84-0.63-1.84-1.85V5.36c0-1.22,0.65-1.85,1.84-1.85l13.27,0.05 c1.17,0,1.83,0.64,1.83,1.85v13.28c0,1.23-0.66,1.85-1.83,1.85L5.34,20.49z M8.71,10.38c1.21,0,2.2-0.99,2.2-2.2 c0-1.21-0.99-2.21-2.2-2.21c-1.22,0-2.2,1-2.2,2.21C6.51,9.4,7.49,10.38,8.71,10.38z M4.43,21.06h14.83c1.52,0,2.24-1.08,2.24-2.98 l-5.23-6.17c-0.4-0.47-0.84-0.7-1.33-0.7c-0.49,0-0.91,0.22-1.32,0.68l-3.94,4.45l-1.62-1.87c-0.37-0.42-0.75-0.64-1.18-0.64 c-0.4,0-0.77,0.2-1.11,0.62L2.5,18.25C2.59,20.16,3.16,21.06,4.43,21.06z"/>
                </svg>
              </span>
              <span class="image-btn-text">
                <span class="image-btn-main">Choose Image A</span>
              </span>
            </span>
          </button>
          <input id="fileInputA" type="file" class="hidden-input" accept="image/*" />

          <div class="image-meta">
            <div class="meta-row">
              <div class="meta-key">Size</div>
              <div id="fileSizeA" class="meta-value empty"></div>
            </div>
            <div class="meta-row">
              <div class="meta-key">Res</div>
              <div id="fileResA" class="meta-value empty"></div>
            </div>
          </div>
        </div>

        <div class="image-row">
          <button id="pickBtnB" class="image-btn empty" type="button" aria-label="Choose Image B">
            <span class="image-btn-inner">
              <span class="image-empty-icon" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 21.96 22.05" preserveAspectRatio="xMidYMid meet">
                  <path d="M5.31,22l13.33,0.05c2.2,0,3.32-1.11,3.32-3.28V5.33c0-2.17-1.11-3.28-3.32-3.28L5.31,2C3.11,2,2,3.11,2,5.28v13.44 C2,20.9,3.11,22,5.31,22z M5.34,20.49c-1.19,0-1.84-0.63-1.84-1.85V5.36c0-1.22,0.65-1.85,1.84-1.85l13.27,0.05 c1.17,0,1.83,0.64,1.83,1.85v13.28c0,1.23-0.66,1.85-1.83,1.85L5.34,20.49z M8.71,10.38c1.21,0,2.2-0.99,2.2-2.2 c0-1.21-0.99-2.21-2.2-2.21c-1.22,0-2.2,1-2.2,2.21C6.51,9.4,7.49,10.38,8.71,10.38z M4.43,21.06h14.83c1.52,0,2.24-1.08,2.24-2.98 l-5.23-6.17c-0.4-0.47-0.84-0.7-1.33-0.7c-0.49,0-0.91,0.22-1.32,0.68l-3.94,4.45l-1.62-1.87c-0.37-0.42-0.75-0.64-1.18-0.64 c-0.4,0-0.77,0.2-1.11,0.62L2.5,18.25C2.59,20.16,3.16,21.06,4.43,21.06z"/>
                </svg>
              </span>
              <span class="image-btn-text">
                <span class="image-btn-main">Choose Image B</span>
              </span>
            </span>
          </button>
          <input id="fileInputB" type="file" class="hidden-input" accept="image/*" />

          <div class="image-meta">
            <div class="meta-row">
              <div class="meta-key">Size</div>
              <div id="fileSizeB" class="meta-value empty"></div>
            </div>
            <div class="meta-row">
              <div class="meta-key">Res</div>
              <div id="fileResB" class="meta-value empty"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="actions">
      <button id="compareBtn" class="action-btn action-primary" type="button" disabled>Compare</button>
      <button id="resetBtn" class="action-btn action-danger" type="button">Reset</button>
    </div>
  </div>

  <div id="fsModal" class="fs-modal" aria-hidden="true">
    <button id="fsCloseBtn" class="fs-close-btn" type="button" aria-label="Close fullscreen viewer">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <div id="fsWrapper" class="fs-image-wrapper">
      <canvas id="fsCanvas" class="fs-image" aria-label="Comparison image fullscreen"></canvas>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
